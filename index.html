<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD23 Resolutions Committee Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.0/papaparse.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .resolution-card { transition: all 0.2s; }
    .resolution-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    details summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto p-6 lg:p-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-gray-900">SD23 Resolutions Committee Report</h1>
        <p class="text-gray-600 mt-1">Resolutions • Grouped by Platform Section • Live from Google Sheet</p>
      </div>
      <button onclick="loadData()" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2">
        <span>Refresh Data</span>
      </button>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- LEFT NAVIGATION SIDEBAR -->
      <div class="lg:w-80 bg-white border border-gray-200 rounded-3xl p-6 h-fit lg:sticky lg:top-8 overflow-hidden">
        <h3 class="font-semibold text-gray-700 mb-4 text-sm uppercase tracking-widest">All Resolutions</h3>
        <div id="sidebar" class="space-y-1 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar"></div>
      </div>

      <!-- MAIN CONTENT (Grouped & Collapsible Sections) -->
      <div class="flex-1" id="results"></div>
    </div>

    <!-- Status -->
    <div id="status" class="mt-10 text-center text-sm text-gray-500"></div>
  </div>

  <script>
    // === CHANGE THIS LINE ONLY ===
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ4ra96zp-AECe9wjzw2q3nq_PUmo6CUi1kADb4fdb2sOmj_nOnTi0ZZwb8Q0p4PwpNnHc3gFzAZea/pub?output=csv";   // ←←← Your published Google Sheet CSV link

    function cleanId(str) {
      return str.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
    }

    function sortByResolutionNumber(a, b) {
      const numA = parseInt((a.number || '').replace(/\D/g, '')) || 0;
      const numB = parseInt((b.number || '').replace(/\D/g, '')) || 0;
      return numA - numB;
    }

    async function loadData() {
      const resultsDiv = document.getElementById('results');
      const sidebarDiv = document.getElementById('sidebar');
      const statusDiv = document.getElementById('status');

      resultsDiv.innerHTML = `
        <div class="flex items-center justify-center py-12">
          <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-600"></div>
          <p class="ml-3 text-gray-600">Loading resolutions…</p>
        </div>`;

      try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();

        Papa.parse(csvText, {
          header: false,
          skipEmptyLines: true,
          complete: function(results) {
            const rows = results.data.slice(1);
            const passedRows = rows.filter(row => (row[2] || "").trim() === "Passed");

            if (passedRows.length === 0) {
              resultsDiv.innerHTML = `<div class="bg-white border border-dashed border-gray-300 rounded-3xl p-12 text-center"><p class="text-xl text-gray-400">No resolutions marked "Passed" yet.</p></div>`;
              statusDiv.textContent = `Last checked: ${new Date().toLocaleString()}`;
              return;
            }

            // Build grouped data + flat list for sidebar
            const grouped = {};
            const allPassed = [];

            passedRows.forEach(row => {
              const section = (row[3] || "Uncategorized").trim() || "Uncategorized";
              const item = {
                number: (row[0] || "—").trim(),
                name: (row[1] || "Unnamed Resolution").trim(),
                link: (row[6] || "#").trim(),
                section: section
              };
              if (!grouped[section]) grouped[section] = [];
              grouped[section].push(item);
              allPassed.push(item);
            });

            // Sort sidebar by resolution number
            allPassed.sort(sortByResolutionNumber);

            // === BUILD SIDEBAR ===
            let sidebarHTML = '';
            allPassed.forEach(item => {
              const id = `res-${cleanId(item.number)}`;
              sidebarHTML += `
                <a href="#${id}" onclick="navigateTo('${id}')" 
                   class="block px-4 py-3 hover:bg-blue-50 rounded-2xl text-gray-700 hover:text-blue-700 transition-colors group">
                  <div class="font-mono text-xs text-blue-600 group-hover:text-blue-700">${item.number}</div>
                  <div class="text-sm line-clamp-2 mt-0.5">${item.name}</div>
                </a>`;
            });
            sidebarDiv.innerHTML = sidebarHTML;

            // === BUILD COLLAPSIBLE MAIN CONTENT ===
            const sortedSections = Object.keys(grouped).sort();
            let mainHTML = '';

            sortedSections.forEach(section => {
              const items = grouped[section];
              mainHTML += `
                <details class="mb-10 group" id="section-${cleanId(section)}">
                  <summary class="flex items-center justify-between cursor-pointer list-none bg-white border border-gray-200 rounded-3xl px-8 py-6 text-2xl font-semibold text-gray-800 hover:bg-gray-50">
                    <span>${section}</span>
                    <div class="flex items-center gap-4">
                      <span class="bg-blue-100 text-blue-700 text-sm font-medium px-5 py-1 rounded-3xl">${items.length} passed</span>
                      <span class="text-3xl transition-transform group-open:rotate-45">+</span>
                    </div>
                  </summary>
                  <div class="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pl-4">
              `;

              items.forEach(item => {
                const id = `res-${cleanId(item.number)}`;
                mainHTML += `
                  <a id="${id}" href="${item.link}" target="_blank" 
                     class="resolution-card block bg-white border border-gray-200 rounded-3xl p-6 hover:border-blue-300">
                    <div class="flex justify-between items-start">
                      <div>
                        <span class="inline-block px-3 py-1 text-xs font-mono bg-blue-100 text-blue-700 rounded-2xl">${item.number}</span>
                        <h3 class="mt-3 text-xl font-semibold text-gray-900">${item.name}</h3>
                      </div>
                      <span class="text-green-500 text-sm font-medium bg-green-100 px-4 py-1 rounded-2xl">PASSED</span>
                    </div>
                    <p class="mt-8 text-blue-600 text-sm flex items-center gap-1">View Full Resolution <span class="text-lg leading-none">→</span></p>
                  </a>`;
              });

              mainHTML += `</div></details>`;
            });

            resultsDiv.innerHTML = mainHTML;
            statusDiv.innerHTML = `
              <span class="font-medium text-green-600">${allPassed.length}</span> total resolutions passed • 
              Last updated: ${new Date().toLocaleString()}
            `;
          }
        });
      } catch (err) {
        resultsDiv.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 rounded-3xl p-8 text-center">Could not load sheet.<br><small class="block mt-2">${err.message}</small></div>`;
      }
    }

    // Auto-open the correct section + smooth scroll when clicking sidebar
    window.navigateTo = function(id) {
      const card = document.getElementById(id);
      if (!card) return;

      // Find the parent <details> and open it
      let parent = card.parentElement;
      while (parent && parent.tagName !== 'DETAILS') {
        parent = parent.parentElement;
      }
      if (parent) parent.open = true;

      // Smooth scroll to the card
      setTimeout(() => {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 80);
    };

    // Auto-load on page open
    window.onload = loadData;
  </script>
</body>
</html>
